name: Fetch Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Run Fetcher
        run: python fetcher.py
        
      - name: Commit data and state
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # Add data.json
          git add data.json
          
          # Safely add or remove alert_state.txt without crashing
          if [ -f alert_state.txt ]; then
            git add alert_state.txt
          else
            git rm --cached alert_state.txt || true
          fi
          
          # Commit and push
          git commit -m "Auto-update dashboard data [skip ci]" || exit 0
          git push
