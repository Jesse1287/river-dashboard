<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>🌊 Flood Center</title>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>🌊 Amite River Tracking</h1>
        
        <div class="nav-tabs">
            <a href="index.html">Home</a>
            <a href="river.html" class="active">🌊 Amite River</a>
            <a href="weather.html">🌦️ Weather</a>
        </div>

        <div class="panel" style="text-align: center; padding: 24px;">
            <div id="status-badge" class="status-badge" style="margin-bottom: 8px;">Checking status...</div>
            <div id="stage" class="metric" style="font-size: 3.2rem; margin: 4px 0;">Loading...</div>
            <div style="font-size: 0.9rem; margin-bottom: 15px; font-weight: 600;">
                24h Change: <span id="delta-trend" style="color: #ffffff;">--</span>
            </div>

            <div class="progress-container">
                <div class="progress-marker" style="left: 0%;">0ft</div>
                <div class="progress-marker" style="left: 72.5%;">Action (29')</div>
                <div class="progress-marker" style="left: 77.5%;">Minor (31')</div>
                <div class="progress-marker" style="left: 87.5%;">Mod (35')</div>
                <div class="progress-marker" style="left: 97.5%;">Major (39')</div>
                <div id="flood-meter" class="progress-bar"></div>
            </div>
        </div>

        <h3>📈 5-Day Hydrograph Predictor</h3>
        <div style="background: white; padding: 8px; border-radius: 16px; display: flex; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);">
            <img id="hydrograph" src="https://water.noaa.gov/resources/hydrographs/denl1_hg.png" alt="Amite River Hydrograph" style="width:100%; border: none; border-radius: 8px;">
        </div>
    </div>

    <script>
    function updateRiverData() {
        const timestamp = Date.now();

        fetch('data.json?t=' + timestamp)
        .then(r => r.json())
        .then(data => {
            document.getElementById('stage').innerText = data.river.stage;
            
            // Map 24h Delta text indicators
            const deltaElement = document.getElementById('delta-trend');
            deltaElement.innerText = data.river.delta;
            if(data.river.delta.startsWith('+')) {
                deltaElement.style.color = "var(--status-red)"; // Rising water warning indicator
            } else {
                deltaElement.style.color = "var(--status-green)";
            }

            // Compute dynamic progress slider sizing width (cap between 0ft and 40ft gauge values)
            let waterLevel = data.river.raw;
            let percentage = (waterLevel / 40) * 100;
            if (percentage > 100) percentage = 100;
            if (percentage < 0) percentage = 0;
            document.getElementById('flood-meter').style.width = percentage + '%';
            
            const status = document.getElementById('status-badge');
            if (data.river.raw >= 29) {
                status.innerText = "⚠️ FLOOD STAGE";
                status.style.background = "rgba(248, 113, 113, 0.15)";
                status.style.color = "var(--status-red)";
            } else {
                status.innerText = "🟢 NORMAL FLOW";
                status.style.background = "rgba(74, 222, 128, 0.15)";
                status.style.color = "var(--status-green)";
            }
        }).catch(err => console.log("Error updating hydrology center."));

        document.getElementById('hydrograph').src = 'https://water.noaa.gov/resources/hydrographs/denl1_hg.png?t=' + timestamp;
    }

    updateRiverData();
    setInterval(updateRiverData, 300000);
    </script>
</body>
</html>
