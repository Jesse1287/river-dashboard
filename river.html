<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>🌊 Flood Center</title>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>🌊 Amite River Tracking</h1>
        
        <div class="nav-tabs">
            <a href="index.html">Home</a>
            <a href="river.html" class="active">🌊 Amite River</a>
            <a href="weather.html">🌦️ Weather</a>
        </div>

        <div class="panel" style="text-align: center; padding: 24px;">
            <div id="status-badge" class="status-badge" style="margin-bottom: 8px;">Checking status...</div>
            <div id="stage" class="metric" style="font-size: 3rem; margin: 4px 0;">Loading...</div>
            <div style="font-size: 0.85rem; color: var(--text-muted);">Flood Stage Action Level: 29.00 ft</div>
        </div>

        <h3>📈 5-Day Hydrograph Predictor</h3>
        <div style="background: white; padding: 8px; border-radius: 16px; display: flex; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);">
            <img id="hydrograph" src="https://water.noaa.gov/resources/hydrographs/denl1_hg.png" alt="Amite River Hydrograph" style="width:100%; border: none; border-radius: 8px;">
        </div>
    </div>

    <script>
    function updateRiverData() {
        const timestamp = Date.now();

        // 1. Fetch fresh telemetry data numbers
        fetch('data.json?t=' + timestamp)
        .then(r => r.json())
        .then(data => {
            document.getElementById('stage').innerText = data.river.stage;
            
            const status = document.getElementById('status-badge');
            if (data.river.raw >= 29) {
                status.innerText = "⚠️ FLOOD STAGE";
                status.style.background = "rgba(248, 113, 113, 0.15)";
                status.style.color = "var(--status-red)";
            } else {
                status.innerText = "🟢 NORMAL FLOW";
                status.style.background = "rgba(74, 222, 128, 0.15)";
                status.style.color = "var(--status-green)";
            }
        }).catch(err => console.log("Error updating flood center data."));

        // 2. Force refresh the NOAA hydrograph image bypass cache
        document.getElementById('hydrograph').src = 'https://water.noaa.gov/resources/hydrographs/denl1_hg.png?t=' + timestamp;
    }

    // Run immediately when the page opens
    updateRiverData();

    // Refresh everything every 5 minutes (300,000 ms)
    setInterval(updateRiverData, 300000);
</script>
</body>
</html>
