<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>🌊 Flood Center</title>
</head>
<body>
    <div class="nav-tabs">
        <a href="index.html">🚪 Gate</a>
        <a href="river.html" class="active">🌊 Flood Center</a>
        <a href="weather.html">🌦️ Live Weather</a>
    </div>
    <h1>Amite River Tracking</h1>
    <div class="panel">
        <div id="status-badge">Checking status...</div>
        <div id="stage" class="metric">Loading...</div>
    </div>
    <img src="https://water.noaa.gov/resources/hydrographs/denl1_hg.png" style="width:100%; border-radius:8px; background:white;">
    <script>
        fetch('data.json').then(r => r.json()).then(data => {
            document.getElementById('stage').innerText = data.river.stage;
            const status = document.getElementById('status-badge');
            status.innerText = data.river.raw >= 29 ? "⚠️ FLOOD STAGE" : "🟢 NORMAL FLOW";
            status.style.color = data.river.raw >= 29 ? "#ff3131" : "#39ff14";
        });
    </script>
</body>
</html>
