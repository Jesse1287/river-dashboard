<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>🌊 Flood Center</title>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>🌊 Amite River Tracking</h1>

        <div id="status-banner" style="display:none; background: rgba(56, 189, 248, 0.1); border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: 600; text-align: center;">
            📢 <span id="custom-message"></span>
        </div>
        
        <div class="nav-tabs">
            <a href="index.html">Home</a>
            <a href="river.html" class="active">🌊 Amite River</a>
            <a href="weather.html">🌦️ Weather</a>
        </div>

        <div class="panel" style="text-align: center; padding: 24px;">
            <div id="status-badge" class="status-badge" style="margin-bottom: 8px;">Checking status...</div>
            <div id="stage" class="metric" style="font-size: 3.2rem; margin: 4px 0;">Loading...</div>
            <div id="delta-container" style="font-size: 0.9rem; margin-bottom: 15px; font-weight: 600; display: none;">
                24h Change: <span id="delta-trend" style="color: #ffffff;">--</span>
            </div>

            <div class="progress-container">
                <div class="progress-marker tier-low" style="left: 0%;">0ft</div>
                <div class="progress-marker tier-high" style="left: 72.5%;">Action (29')</div>
                <div class="progress-marker tier-low" style="left: 77.5%;">Minor (31')</div>
                <div class="progress-marker tier-high" style="left: 87.5%;">Mod (35')</div>
                <div class="progress-marker tier-low" style="left: 97.5%;">Major (39')</div>
                <div id="flood-meter" class="progress-bar"></div>
            </div>
        </div>

        <h3>📈 River Forecast Hydrograph</h3>
        <div style="background: white; padding: 8px; border-radius: 16px; display: flex; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);">
            <img id="hydrograph" src="https://water.noaa.gov/resources/hydrographs/denl1_hg.png" alt="Amite River Hydrograph" style="width:100%; border: none; border-radius: 8px;">
        </div>
    </div>

    <script>
    function updateRiverData() {
        fetch('data.json?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
            // Message Banner Logic
            const banner = document.getElementById('status-banner');
            if (data.system && data.system.message) {
                banner.style.display = 'block';
                document.getElementById('custom-message').innerText = data.system.message;
            } else {
                banner.style.display = 'none';
            }

            if (!data.river) return;
            document.getElementById('stage').innerText = data.river.stage || '--';
            // ... (rest of your existing logic)
            document.getElementById('flood-meter').style.width = ((data.river.raw || 0) / 40 * 100) + '%';
        });
    }
    updateRiverData();
    setInterval(updateRiverData, 300000);
    </script>
</body>
</html>
