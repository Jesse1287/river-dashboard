<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>🌊 River | Roux Studio</title>
</head>
<body>
    <div class="nav">
        <a href="index.html">🚪 Gate</a>
        <a href="river.html" class="active">🌊 River</a>
        <a href="weather.html">🌦️ Weather</a>
    </div>
    <h1>Amite River Tracking</h1>
    <div class="panel">
        <div id="river-stage" class="metric">Loading stage...</div>
    </div>
    <img src="https://water.noaa.gov/resources/hydrographs/denl1_hg.png" style="width:100%; border-radius:8px;">
    <script>
        fetch('data.json').then(r => r.json()).then(data => {
            document.getElementById('river-stage').innerText = "Current Stage: " + data.river.stage;
        });
    </script>
</body>
</html>
