<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>🌊 Flood Watch | Roux Command</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="container">
        <h1>🌊 Amite River Flood Watch</h1>
        
        <div class="heartbeat-container">
            <span class="pulse-dot"></span>             River Gauge Telemetry: <span class="sys-clock">--:-- -- ---</span>
        </div>

        <div class="nav-tabs">
            <a href="index.html"><span class="icon">🏠</span> <span>HQ</span></a>
            <a href="river.html" class="active"><span class="icon">🌊</span> <span>Flood</span></a>
            <a href="prep.html"><span class="icon">🌀</span> <span>Hurricane</span></a>
            <a href="weather.html"><span class="icon">🌦️</span> <span>Weather</span></a>
            <a href="forecast.html"><span class="icon">📅</span> <span>Forecast</span></a>
        </div>

        <div id="river-main-panel" class="panel float-hover" style="text-align: center; padding: 24px;">
            <div id="status-badge" class="status-badge" style="margin-bottom: 8px;">Polling river gauges...</div>
            <div id="stage" class="metric" style="font-size: 3.8rem; margin: 4px 0; font-family: monospace;">0.00</div>
            
            <div id="delta-container" style="font-size: 0.9rem; margin-bottom: 5px; font-weight: 600;">
                24h Trend: <span id="delta-trend">--</span>
            </div>
            
            <div id="ark-status" style="font-size: 0.85rem; color: var(--text-muted); font-style: italic; margin-bottom: 20px;">
                Checking requirements...
            </div>

            <div style="background: #0b1017; border-radius: 10px; height: 16px; width: 100%; position: relative; margin: 45px 0 35px 0; border: 1px solid var(--border-color); overflow: visible;">
                <div id="flood-meter" style="background: linear-gradient(90deg, var(--status-green) 60%, var(--status-orange) 85%, var(--status-red) 100%); height: 100%; border-radius: 9px; width: 0%; transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); position: relative;"></div>
                <div style="position: absolute; left: 72.5%; top: -5px; bottom: -5px; width: 2px; background: rgba(255, 255, 255, 0.4); z-index: 10;">
                    <div style="position: absolute; top: -22px; left: 50%; transform: translateX(-50%); font-size: 0.75rem; font-weight: bold; color: var(--status-orange);">Action (29ft)</div>
                </div>
                <div style="position: absolute; left: 87.5%; top: -5px; bottom: -5px; width: 2px; background: rgba(255, 255, 255, 0.4); z-index: 10;">
                    <div style="position: absolute; top: -22px; left: 50%; transform: translateX(-50%); font-size: 0.75rem; font-weight: bold; color: var(--status-red);">Major (35ft)</div>
                </div>
            </div>
        </div>

        <h3>📈 River Forecast Hydrograph</h3>
        <div style="background: rgba(255,255,255,0.9); padding: 8px; border-radius: 16px; display: flex; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.15);">
            <img id="hydrograph" src="" alt="Amite River Hydrograph" style="width:100%; border: none; border-radius: 8px;">
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = (progress * (end - start) + start).toFixed(2) + ' ft';
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        async function initRiver() {
            updateClock();
            const r = await fetchRiver();
            if (!r) return;

            const stageEl = document.getElementById('stage');
            animateValue(stageEl, 0, r.raw, 1000);

            const deltaEl = document.getElementById('delta-trend');
            deltaEl.innerText = r.delta;
            deltaEl.style.color = r.delta.startsWith('+') ? "var(--status-red)" : "var(--status-green)";

            let pct = (r.raw / 40) * 100;
            document.getElementById('flood-meter').style.width = Math.min(Math.max(pct, 0), 100) + '%';

            const status = document.getElementById('status-badge');
            const ark = document.getElementById('ark-status');
            const panel = document.getElementById('river-main-panel');

            if (r.raw >= 35) {
                status.innerText = "🚨 MAJOR FLOOD";
                status.style.background = "rgba(248, 113, 113, 0.3)";
                status.style.color = "var(--status-red)";
                panel.classList.add('critical-state');
                ark.innerText = "Noah's Ark protocol: ACTIVATED. Severe overflow occurring.";
            } else if (r.raw >= 29) {
                status.innerText = "⚠️ ACTION STAGE";
                status.style.background = "rgba(251, 146, 60, 0.15)";
                status.style.color = "var(--status-orange)";
                panel.classList.remove('critical-state');
                ark.innerText = "Water entering low-lying areas. Monitor continuously.";
            } else {
                status.innerText = "🟢 FLOW NOMINAL";
                status.style.background = "rgba(74, 222, 128, 0.15)";
                status.style.color = "var(--status-green)";
                panel.classList.remove('critical-state');
                ark.innerText = "Discharge rate and stage depth within normal operating parameters.";
            }
            document.getElementById('hydrograph').src = 'https://water.noaa.gov/resources/hydrographs/denl1_hg.png?t=' + Date.now();
        }

        initRiver();
        setInterval(initRiver, 300000);
    </script>
</body>
</html>
