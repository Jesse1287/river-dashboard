<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>🖥️ Core Node</title>

<body>
    <div class="nav">
        <a href="index.html" class="active">🖥️ Core Node</a>
        <a href="river.html">🌊 River</a>
        <a href="weather.html">🌦️ Weather</a>
    </div>
    <h1>Z600 Admin Node</h1>
    <div class="panel">
        <h2>System Resources</h2>
        <p id="stats">Loading data...</p>
    </div>
    <script>
        fetch('data.json')
            .then(r => r.json())
            .then(data => {
                document.getElementById('stats').innerText = "CPU: " + data.cpu + "% | RAM: " + data.ram_p + "%";
            });
    </script>
</body>
</html>
