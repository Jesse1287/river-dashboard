<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>🏠 HQ | Roux Command</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="container">
        <h1>🚀 <span id="dynamic-greeting">Roux Family</span> Command</h1>
        
        <div class="heartbeat-container">
            <span class="pulse-dot"></span>             All Systems Nominal: <span class="sys-clock">--:-- -- ---</span>
        </div>
        
        <div class="nav-tabs">
            <a href="index.html" class="active"><span class="icon">🏠</span> <span>HQ</span></a>
            <a href="river.html"><span class="icon">🌊</span> <span>Flood</span></a>
            <a href="prep.html"><span class="icon">🌀</span> <span>Hurricane</span></a>
            <a href="weather.html"><span class="icon">🌦️</span> <span>Weather</span></a>
            <a href="forecast.html"><span class="icon">📅</span> <span>Forecast</span></a>
        </div>

        <div class="panel float-hover" id="home-river-panel" style="border-left: 5px solid var(--accent-blue);">
            <h3>🌊 Amite River Status</h3>
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <div id="home-stage" class="metric">Loading...</div>
                <div id="home-river-status" class="status-badge" style="background: rgba(255,255,255,0.05); color: var(--text-muted);">Awaiting telemetry...</div>
            </div>
            <div style="height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 10px; overflow: hidden; position: relative;">
                <div id="mini-river-fill" style="height: 100%; background: var(--status-green); width: 0%; transition: width 1s ease, background 0.5s;"></div>
            </div>
        </div>

        <div class="grid-3">
            <div class="panel float-hover">
                <h3>🏡 Denham Springs</h3>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <div id="denham-icon" style="font-size: 1.8rem;"></div>
                    <div id="denham-temp" class="metric">--°</div>
                </div>
                <div id="denham-desc" style="color: var(--text-muted);">Syncing sensors...</div>
            </div>
            <div class="panel float-hover">
                <h3>🏭 Donaldsonville</h3>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <div id="don-icon" style="font-size: 1.8rem;"></div>
                    <div id="don-temp" class="metric">--°</div>
                </div>
                <div id="don-desc" style="color: var(--text-muted);">Syncing sensors...</div>
            </div>
            <div class="panel float-hover">
                <h3>🏥 Ponchatoula</h3>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <div id="ponch-icon" style="font-size: 1.8rem;"></div>
                    <div id="ponch-temp" class="metric">--°</div>
                </div>
                <div id="ponch-desc" style="color: var(--text-muted);">Syncing sensors...</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const hour = new Date().getHours();
        let greeting = "Roux Family";
        if (hour < 12) greeting = "☕ Morning Ops";
        else if (hour < 18) greeting = "☀️ Afternoon Ops";
        else greeting = "🌙 Night Cycle";
        document.getElementById('dynamic-greeting').innerHTML = greeting;

        async function initDashboard() {
            updateClock();
            
            const riverData = await fetchRiver();
            if (riverData) {
                document.getElementById('home-stage').innerText = riverData.stage + ' ft';
                const status = document.getElementById('home-river-status');
                const fill = document.getElementById('mini-river-fill');
                const panel = document.getElementById('home-river-panel');
                
                let percent = (riverData.raw / 40) * 100;
                fill.style.width = Math.min(percent, 100) + '%';

                if (riverData.raw >= 35) {
                    status.innerText = "🚨 MAJOR FLOOD";
                    status.style.color = "var(--status-red)";
                    fill.style.background = "var(--status-red)";
                    panel.style.borderLeftColor = "var(--status-red)";
                    panel.classList.add('critical-state');
                } else if (riverData.raw >= 29) {
                    status.innerText = "⚠️ ACTION STAGE";
                    status.style.color = "var(--status-orange)";
                    fill.style.background = "var(--status-orange)";
                    panel.style.borderLeftColor = "var(--status-orange)";
                    panel.classList.remove('critical-state');
                } else {
                    status.innerText = "🟢 NOMINAL";
                    status.style.color = "var(--status-green)";
                    fill.style.background = "var(--status-green)";
                    panel.style.borderLeftColor = "var(--accent-blue)";
                    panel.classList.remove('critical-state');
                }
            }

            const locations = [
                { lat: 30.48, lon: -90.95, prefix: 'denham' },
                { lat: 30.10, lon: -90.99, prefix: 'don' },
                { lat: 30.44, lon: -90.40, prefix: 'ponch' }
            ];

            for (const loc of locations) {
                const w = await fetchWeather(loc.lat, loc.lon);
                if (w) {
                    document.getElementById(`${loc.prefix}-temp`).innerText = w.current.temp + '°';
                    document.getElementById(`${loc.prefix}-icon`).innerText = w.current.icon;
                    document.getElementById(`${loc.prefix}-desc`).innerText = w.current.desc;
                }
            }
        }

        initDashboard();
        setInterval(initDashboard, 300000);
    </script>
</body>
</html>
