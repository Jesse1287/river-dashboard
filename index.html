<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel=\"stylesheet\" href=\"style.css\">
    <title>🏠 Family Dashboard</title>\n    <link rel=\"manifest\" href=\"manifest.json\">\n</head>
<body>
    <div class="container">
        <h1>🏠 Family Watch</h1>
        <div class="heartbeat-container">
            <span class="pulse-dot"></span> Telemetry Active: <span id="sys-clock">--</span>
        </div>
        
        <div class="nav-tabs">
            <a href="index.html" class="active">Home</a>
            <a href="river.html">🌊 Amite River</a>
            <a href="weather.html">🌦️ Weather</a>
        </div>

        <div class="panel" style="border-left: 5px solid var(--accent-blue);">
            <h3>🌊 Amite River Status</h3>
            <div id="home-stage" class="metric">Loading...</div>
            <div id="home-river-status" class="status-badge" style="background: rgba(255,255,255,0.05); color: var(--text-muted); display: inline-block; margin-top: 4px;">Checking...</div>
        </div>

        <div class="grid-3">
            <div class="panel">
                <h3>🏡 Denham Springs</h3>
                <div id="home-denham-temp" class="metric">--</div>
                <div id="home-denham-desc" style="color: var(--text-muted); text-transform: capitalize;">Loading...</div>
            </div>
            <div class="panel">
                <h3>🏭 Donaldsonville</h3>
                <div id="home-donaldsonville-temp" class="metric">--</div>
                <div id="home-donaldsonville-desc" style="color: var(--text-muted); text-transform: capitalize;">Loading...</div>
            </div>
            <div class="panel" style="border-top: 3px solid var(--status-orange);">
                <h3>🏥 Ponchatoula (Work)</h3>
                <div id="home-ponchatoula-temp" class="metric">--</div>
                <div id="home-ponchatoula-desc" style="color: var(--text-muted); text-transform: capitalize;">Loading...</div>
            </div>
        </div>
    </div>

    <script>
    function updateData() {
        fetch('data.json?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
            document.getElementById('sys-clock').innerText = data.system.last_updated;
            document.getElementById('home-stage').innerText = data.river.stage;
            
            const status = document.getElementById('home-river-status');
            const rawVal = data.river.raw || 0;
            if (rawVal >= 29) {
                status.innerText = "⚠️ FLOOD STAGE";
                status.style.background = "rgba(248, 113, 113, 0.15)";
                status.style.color = "var(--status-red)";
            } else {
                status.innerText = "🟢 NORMAL FLOW";
                status.style.background = "rgba(74, 222, 128, 0.15)";
                status.style.color = "var(--status-green)";
            }

            if (data.weather) {
                if (data.weather.denham) {
                    const denham = data.weather.denham.current || data.weather.denham;
                    document.getElementById('home-denham-temp').innerText = denham.temp || '--';
                    document.getElementById('home-denham-desc').innerText = denham.desc || '--';
                }
                if (data.weather.donaldsonville) {
                    const dville = data.weather.donaldsonville.current || data.weather.donaldsonville;
                    document.getElementById('home-donaldsonville-temp').innerText = dville.temp || '--';
                    document.getElementById('home-donaldsonville-desc').innerText = dville.desc || '--';
                }
                if (data.weather.ponchatoula) {
                    const ponch = data.weather.ponchatoula.current || data.weather.ponchatoula;
                    document.getElementById('home-ponchatoula-temp').innerText = ponch.temp || '--';
                    document.getElementById('home-ponchatoula-desc').innerText = ponch.desc || '--';
                }
            }
        }).catch(err => console.log("Error reading homepage json:", err));
    }

    updateData();
    setInterval(updateData, 300000);
    </script>
</body>
</html>
