<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>🏠 Family Dashboard</title>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>🏠 Family Watch</h1>
        <div class="heartbeat-container">
            <span class="pulse-dot"></span> Telemetry Active: <span id="sys-clock">--</span>
        </div>
        
        <div class="nav-tabs">
            <a href="index.html" class="active">Home</a>
            <a href="river.html">🌊 Amite River</a>
            <a href="weather.html">🌦️ Weather</a>
        </div>

        <div class="panel" style="border-left: 5px solid var(--accent-blue);">
            <h3>🌊 Amite River Status</h3>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div id="home-stage" class="metric">Loading...</div>
                <div id="home-river-status" class="status-badge">Checking...</div>
            </div>
        </div>

        <div class="grid-2">
            <div class="panel">
                <h3>🏡 Denham Springs</h3>
                <div id="home-denham-temp" class="metric">--</div>
                <div id="home-denham-desc" style="color: var(--text-muted); text-transform: capitalize;">Loading...</div>
            </div>
            <div class="panel">
                <h3>🏭 Donaldsonville</h3>
                <div id="home-donaldsonville-temp" class="metric">--</div>
                <div id="home-donaldsonville-desc" style="color: var(--text-muted); text-transform: capitalize;">Loading...</div>
            </div>
        </div>

        <h3>🛠️ Infrastructure Control Center</h3>
        <div class="panel" style="padding: 14px;">
            <div class="launch-grid">
                <a href="http://openmediavault.local" target="_blank" class="launch-card">
                    <span>💾</span> OMV Server
                </a>
                <a href="http://portainer.local" target="_blank" class="launch-card">
                    <span>🐋</span> Portainer
                </a>
                <a href="https://login.tailscale.com" target="_blank" class="launch-card">
                    <span>🔒</span> Tailscale Node
                </a>
                <a href="http://pi.hole/admin" target="_blank" class="launch-card">
                    <span>🛡️</span> Network AdGuard
                </a>
            </div>
        </div>
    </div>

    <script>
    function updateData() {
        fetch('data.json?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
            // Map System Heartbeat Clock
            document.getElementById('sys-clock').innerText = data.system.last_updated;

            // Map River Data Metrics
            document.getElementById('home-stage').innerText = data.river.stage;
            const status = document.getElementById('home-river-status');
            if (data.river.raw >= 29) {
                status.innerText = "⚠️ FLOOD STAGE";
                status.style.background = "rgba(248, 113, 113, 0.15)";
                status.style.color = "var(--status-red)";
            } else {
                status.innerText = "🟢 NORMAL FLOW";
                status.style.background = "rgba(74, 222, 128, 0.15)";
                status.style.color = "var(--status-green)";
            }

            // Map Weather Summaries
            document.getElementById('home-denham-temp').innerText = data.weather.denham.current.temp;
            document.getElementById('home-denham-desc').innerText = data.weather.denham.current.desc;
            
            document.getElementById('home-donaldsonville-temp').innerText = data.weather.donaldsonville.current.temp;
            document.getElementById('home-donaldsonville-desc').innerText = data.weather.donaldsonville.current.desc;
        }).catch(err => console.log("Error reading homepage json."));
    }

    updateData();
    setInterval(updateData, 300000);
    </script>
</body>
</html>
