<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>🌦️ Weather Operations</title>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>🌦️ Regional Weather</h1>
        
        <div class="nav-tabs">
            <a href="index.html">Home</a>
            <a href="river.html">🌊 Amite River</a>
            <a href="weather.html" class="active">🌦️ Weather</a>
        </div>

        <div class="panel">
            <h2 style="color: var(--accent-blue);">🏡 Denham Springs</h2>
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <div id="denham-temp" class="metric" style="margin:0;">--</div>
                <div id="denham-desc" style="font-weight: 600; text-transform: capitalize;">Loading...</div>
            </div>
            
            <div class="weather-info-grid">
                <div class="info-item">Feels Like <strong id="denham-feels">--</strong></div>
                <div class="info-item">Rain Chance <strong id="denham-pop">--</strong></div>
                <div class="info-item">Humidity <strong id="denham-hum">--</strong></div>
                <div class="info-item">Wind Speed <strong id="denham-wind">--</strong></div>
            </div>

            <div id="denham-forecast" class="forecast-strip"></div>
        </div>

        <div class="panel">
            <h2 style="color: var(--accent-blue);">🏭 Donaldsonville</h2>
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <div id="donaldsonville-temp" class="metric" style="margin:0;">--</div>
                <div id="donaldsonville-desc" style="font-weight: 600; text-transform: capitalize;">Loading...</div>
            </div>
            
            <div class="weather-info-grid">
                <div class="info-item">Feels Like <strong id="donaldsonville-feels">--</strong></div>
                <div class="info-item">Rain Chance <strong id="donaldsonville-pop">--</strong></div>
                <div class="info-item">Humidity <strong id="donaldsonville-hum">--</strong></div>
                <div class="info-item">Wind Speed <strong id="donaldsonville-wind">--</strong></div>
            </div>

            <div id="donaldsonville-forecast" class="forecast-strip"></div>
        </div>

        <h3>🛰️ Live Interactive Radar</h3>
        <div class="panel radar-container">
            <iframe class="responsive-radar" src="https://www.ventusky.com/?p=30.48;-90.95;9&l=radar" allowfullscreen></iframe>
        </div>
    </div>

    <script>
    function updateWeatherData() {
        fetch('data.json?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
            if (!data.weather) return;

            // 1. Map Denham Springs Live Telemetry safely
            if (data.weather.denham) {
                const denhamCurrent = data.weather.denham.current ? data.weather.denham.current : data.weather.denham;
                document.getElementById('denham-temp').innerText = denhamCurrent.temp || '--';
                document.getElementById('denham-desc').innerText = denhamCurrent.desc || '--';
                document.getElementById('denham-feels').innerText = denhamCurrent.feels || '--';
                document.getElementById('denham-pop').innerText = denhamCurrent.pop || '--';
                document.getElementById('denham-hum').innerText = denhamCurrent.hum || '--';
                document.getElementById('denham-wind').innerText = denhamCurrent.wind || '--';
                
                let denhamHtml = '';
                if (data.weather.denham.forecast) {
                    data.weather.denham.forecast.forEach(f => {
                        denhamHtml += `
                            <div class="forecast-card">
                                <div>${f.time}</div>
                                <strong>${f.temp}</strong>
                                <div style="font-size:0.7rem; color:var(--accent-blue);">${f.pop} Rain</div>
                            </div>
                        `;
                    });
                }
                document.getElementById('denham-forecast').innerHTML = denhamHtml;
            }

            // 2. Map Donaldsonville Live Telemetry safely
            if (data.weather.donaldsonville) {
                const donCurrent = data.weather.donaldsonville.current ? data.weather.donaldsonville.current : data.weather.donaldsonville;
                document.getElementById('donaldsonville-temp').innerText = donCurrent.temp || '--';
                document.getElementById('donaldsonville-desc').innerText = donCurrent.desc || '--';
                document.getElementById('donaldsonville-feels').innerText = donCurrent.feels || '--';
                document.getElementById('donaldsonville-pop').innerText = donCurrent.pop || '--';
                document.getElementById('donaldsonville-hum').innerText = donCurrent.hum || '--';
                document.getElementById('donaldsonville-wind').innerText = donCurrent.wind || '--';

                let donaldsonHtml = '';
                if (data.weather.donaldsonville.forecast) {
                    data.weather.donaldsonville.forecast.forEach(f => {
                        donaldsonHtml += `
                            <div class="forecast-card">
                                <div>${f.time}</div>
                                <strong>${f.temp}</strong>
                                <div style="font-size:0.7rem; color:var(--accent-blue);">${f.pop} Rain</div>
                            </div>
                        `;
                    });
                }
                document.getElementById('donaldsonville-forecast').innerHTML = donaldsonHtml;
            }

        }).catch(err => console.log("Error updating forecast dashboard rows:", err));
    }

    updateWeatherData();
    setInterval(updateWeatherData, 300000);
    </script>
</body>
</html>
