<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>🌦️ Weather Operations</title>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>🌦️ Regional Weather</h1>
        
        <div class="nav-tabs">
            <a href="index.html">Home</a>
            <a href="river.html">🌊 Amite River</a>
            <a href="weather.html" class="active">🌦️ Weather</a>
        </div>

        <div class="panel">
            <h2 style="color: var(--accent-blue);">🏡 Denham Springs</h2>
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <div id="denham-temp" class="metric" style="margin:0;">--</div>
                <div id="denham-desc" style="font-weight: 600; text-transform: capitalize;">Loading...</div>
            </div>
            
            <div class="weather-info-grid">
                <div class="info-item">Feels Like <strong id="denham-feels">--</strong></div>
                <div class="info-item">Rain Chance <strong id="denham-pop">--</strong></div>
                <div class="info-item">Humidity <strong id="denham-hum">--</strong></div>
                <div class="info-item">Wind Speed <strong id="denham-wind">--</strong></div>
            </div>
        </div>

        <div class="panel">
            <h2 style="color: var(--accent-blue);">🏭 Donaldsonville</h2>
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <div id="donaldsonville-temp" class="metric" style="margin:0;">--</div>
                <div id="donaldsonville-desc" style="font-weight: 600; text-transform: capitalize;">Loading...</div>
            </div>
            
            <div class="weather-info-grid">
                <div class="info-item">Feels Like <strong id="donaldsonville-feels">--</strong></div>
                <div class="info-item">Rain Chance <strong id="donaldsonville-pop">--</strong></div>
                <div class="info-item">Humidity <strong id="donaldsonville-hum">--</strong></div>
                <div class="info-item">Wind Speed <strong id="donaldsonville-wind">--</strong></div>
            </div>
        </div>

        <h3>🛰️ Live Interactive Radar</h3>
        <div class="panel" style="padding: 0; overflow: hidden; position: relative;">
            <iframe src="https://www.ventusky.com/?p=30.48;-90.95;9&l=radar" width="100%" frameborder="0" allowfullscreen style="border:none; vertical-align: bottom;"></iframe>
        </div>
    </div>

    <script>
    function updateWeatherData() {
        fetch('data.json?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
            // Updates Denham Springs card text
            document.getElementById('denham').innerHTML = 
                `${data.weather.denham.temp} — ${data.weather.denham.desc}`;
            
            // Updates Donaldsonville card text
            document.getElementById('donaldsonville').innerHTML = 
                `${data.weather.donaldsonville.temp} — ${data.weather.donaldsonville.desc}`;
                
        }).catch(err => console.log("Error updating weather operations data."));
    }

    // Run immediately when the page opens
    updateWeatherData();

    // Refresh every 5 minutes (300,000 ms)
    setInterval(updateWeatherData, 300000);
</script>
</body>
</html>
