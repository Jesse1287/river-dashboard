<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>🌦️ Weather | Roux Studio</title>
</head>
<body>
    <div class="nav">
        <a href="index.html">🚪 Gate</a>
        <a href="river.html">🌊 River</a>
        <a href="weather.html" class="active">🌦️ Weather</a>
    </div>
    <h1>Regional Weather</h1>
    <div class="panel">
        <h3>🏡 Denham Springs</h3>
        <div id="denham" class="metric">Loading...</div>
    </div>
    <div class="panel">
        <h3>🏭 Donaldsonville</h3>
        <div id="donaldsonville" class="metric">Loading...</div>
    </div>
    <div class="panel">
        <h3>🛰️ Live Radar</h3>
        <iframe src="https://www.ventusky.com/?p=30.36;-91.07;9&l=radar" style="width:100%; height:400px; border:none; border-radius:8px;"></iframe>
    </div>
    <script>
        fetch('data.json').then(r => r.json()).then(data => {
            const d = data.weather;
            document.getElementById('denham').innerHTML = `<b>Temp:</b> ${d.denham.temp} | <b>Condition:</b> ${d.denham.desc}`;
            document.getElementById('donaldsonville').innerHTML = `<b>Temp:</b> ${d.donaldsonville.temp} | <b>Condition:</b> ${d.donaldsonville.desc}`;
        });
    </script>
</body>
</html>
