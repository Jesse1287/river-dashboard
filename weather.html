<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>🌦️ Weather | Regional Ops</title>
</head>
<body>
    <div class="nav">
        <a href="index.html">🖥️ Core</a>
        <a href="river.html">🌊 River</a>
        <a href="weather.html">🌦️ Weather</a>
    </div>

    <h1>Regional Weather Operations</h1>
    <div class="weather-metrics-grid" id="weather-grid">
        </div>

    <div class="radar-panel">
        <h2>Live Radar</h2>
        <iframe src="https://www.ventusky.com/?p=30.36;-91.07;9&l=radar"></iframe>
    </div>

    <script>
        fetch('data.json').then(r => r.json()).then(data => {
            const w = data.weather;
            const container = document.getElementById('weather-grid');
            
            const createCard = (title, accent, d) => `
                <div class="card" style="border-top: 4px solid ${accent}">
                    <div class="loc-title" style="color:${accent}">${title}</div>
                    <div class="row"><small>Temp / Feels</small><span>${d.temp} / ${d.feels}</span></div>
                    <div class="row"><small>Condition</small><span>${d.desc}</span></div>
                    <div class="row"><small>Rain Prob</small><span>${d.pop}</span></div>
                    <div class="row"><small>Humidity</small><span>${d.hum}</span></div>
                    <div class="row"><small>Wind</small><span>${d.wind}</span></div>
                </div>`;

            container.innerHTML = 
                createCard('🏡 Denham Springs', '#58a6ff', w.denham) +
                createCard('🏭 Donaldsonville', '#ffbc42', w.donaldsonville);
        });
    </script>
</body>
</html>
