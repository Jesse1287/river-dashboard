<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>🌦️ Weather Operations</title>
</head>
<body>
    <div class="nav-container">
        <div class="nav-tabs">
            <a href="index.html">🚪 Gate</a>
            <a href="river.html">🌊 Flood Center</a>
            <a href="weather.html" class="active">🌦️ Live Weather</a>
        </div>
    </div>
    <h1>Weather Operations</h1>
    <div class="panel">
        <h3>🏡 Denham Springs</h3>
        <div id="denham" class="metric">Loading...</div>
    </div>
    <div class="panel">
        <h3>🏭 Donaldsonville</h3>
        <div id="donaldsonville" class="metric">Loading...</div>
    </div>
    <div class="panel">
        <h3>🛰️ Radar</h3>
        <iframe src="https://www.ventusky.com/?p=30.36;-91.07;9&l=radar" style="width:100%; height:400px; border:none; border-radius:8px;"></iframe>
    </div>
    <script>
        fetch('data.json').then(r => r.json()).then(data => {
            const d = data.weather;
            document.getElementById('denham').innerHTML = `${d.denham.temp} - ${d.denham.desc}`;
            document.getElementById('donaldsonville').innerHTML = `${d.donaldsonville.temp} - ${d.donaldsonville.desc}`;
        });
    </script>
</body>
</html>
