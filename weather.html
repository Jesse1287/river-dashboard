<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>🌦️ Weather Dashboard</title>
</head>
<body>
    <div class="nav">
        <a href="index.html">🖥️ Core Node</a>
        <a href="river.html">🌊 River</a>
        <a href="weather.html">🌦️ Weather</a>
    </div>
    <h1>Weather Operations</h1>
    <div class="panel">
        <h2>Denham Springs (Home)</h2>
        <div id="weather-data">Loading...</div>
    </div>
    <div class="panel" style="margin-top: 20px;">
        <h2>Live Radar</h2>
        <iframe src="https://www.ventusky.com/?p=30.36;-91.07;9&l=radar" style="width:100%; height:400px; border:none;"></iframe>
    </div>
    <script>
        fetch('data.json')
            .then(r => r.json())
            .then(data => {
                const w = data.weather.denham;
                document.getElementById('weather-data').innerHTML = `Temp: ${w.temp} <br> Condition: ${w.desc} <br> Wind: ${w.wind}`;
            });
    </script>
</body>
</html>
