<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>🌦️ Weather Operations</title>
</head>
<body>
    <div class="nav-tabs">
        <a href="index.html">🚪 Gate</a>
        <a href="river.html">🌊 Flood Center</a>
        <a href="weather.html" class="active">🌦️ Live Weather</a>
    </div>
    <h1>Weather Operations</h1>
    <div class="panel">
        <h3>🏡 Denham Springs</h3>
        <div id="denham" class="metric">Loading...</div>
    </div>
    <div class="panel">
        <h3>🏭 Donaldsonville</h3>
        <div id="donaldsonville" class="metric">Loading...</div>
    </div>
    <div class="panel">
        <h3>🛰️ Radar</h3>
        <iframe src="https://www.ventusky.com/?p=30.48;-90.95;9&l=radar" width="100%" height="400" frameborder="0" allowfullscreen></iframe>
    </div>
    <script>
        fetch('data.json').then(r => r.json()).then(data => {
            document.getElementById('denham').innerHTML = `${data.weather.denham.temp} - ${data.weather.denham.desc}`;
            document.getElementById('donaldsonville').innerHTML = `${data.weather.donaldsonville.temp} - ${data.weather.donaldsonville.desc}`;
        });
    </script>
</body>
</html>
