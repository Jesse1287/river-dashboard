<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>🌦️ Weather Operations</title>
</head>
<body>
    <div class="container">
        <h1>🌦️ Regional Weather</h1>
        
        <div id="status-banner" style="display:none; background: rgba(56, 189, 248, 0.1); border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: 600; text-align: center;">
            📢 <span id="custom-message"></span>
        </div>

        <div class="nav-tabs">
            <a href="index.html">Home</a>
            <a href="river.html">🌊 Amite River</a>
            <a href="weather.html" class="active">🌦️ Weather</a>
        </div>

        </div>

    <script>
    function updateWeatherData() {
        fetch('data.json?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
            // Message Banner Logic
            const banner = document.getElementById('status-banner');
            if (data.system && data.system.message) {
                banner.style.display = 'block';
                document.getElementById('custom-message').innerText = data.system.message;
            } else {
                banner.style.display = 'none';
            }

            // ... (your existing weather update logic)
        });
    }
    updateWeatherData();
    setInterval(updateWeatherData, 300000);
    </script>
</body>
</html>
