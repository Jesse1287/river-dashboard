<div class="panel" style="padding: 20px; border-radius: 16px; margin-bottom: 20px;">
    <h2 style="color: var(--status-orange);">🌀 Tropical Cyclone Status</h2>
    <!-- Official NHC Tracker -->
    <iframe src="https://www.nhc.noaa.gov/widgets/nhc_widget.shtml" width="100%" height="280px" scrolling="no" frameborder="0"></iframe>

    <div id="prep-checklist" style="margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 20px;">
        <h3>Emergency Checklist</h3>
        <form id="emergency-list">
            <label><input type="checkbox"> Water (1 gal/person/day)</label><br>
            <label><input type="checkbox"> Non-perishable food</label><br>
            <label><input type="checkbox"> Battery-powered radio</label><br>
            <label><input type="checkbox"> Flashlights & Extra Batteries</label>
        </form>
    </div>
</div>
    <script src="app.js"></script>
    <script>
        updateClock();
        initChecklist(); // Fires the local storage logic from app.js
    </script>
